# To use ChroniaHelper's Modified Animated Parallax,
# the graphical files must be placed behind "bgs/ChroniaHelper/modifiedParallax/"

# FPS, defining how fast the animated parallax plays
# FPS: float
FPS: 2

# Frames, defining how the parallax plays the animation
# Frames: frames syntax, the same as Sprites.xml animation syntax
Frames: 0,0-9

# TriggerFlag, the parallax will only play WHEN THE FLAG IS ACTIVE
# TriggerFlag: flag name
TriggerFlag: StartCounting

# ResetFlag, once the flag is triggered, the parallax will immediately reset to the Reset Frame,
# if not set, the default Reset Frame is 0
# ResetFlag: flag name
ResetFlag: ResetCounting

# ResetFrame, the frame index that the parallax should reset to, by default 0
# ResetFrame: integer
ResetFrame: 0

# PlayOnce, whether the parallax should stop playing after the parallax reached 
# the last frame of the animation
# PlayOnce: bool
PlayOnce: false

# SpeedSlider, using a slider in-game to control the parallax play speed
# Note that the SpeedSlider is a modification value based on 1,
# for example, if the speedSlider has a value of 0.5, 
# then the animation speed would be 0.5 + 1 == 1.5
# SpeedSlider: slider name
SpeedSlider: speedSlider

# AlphaExpression, an expression built-in ChroniaHelper that uses sliders and flags
# to calculate mathmetical results
# AlphaExpression: ChroniaHelper Expression
AlphaExpression: 1 - bgSlider

# FrameIndexFlag, enables specific flags when the animation reached certain frame index from its total frames
# Note that this index is an absolute value, counting the processed animation frame order,
# which means the "Frames" setting above will affect this setting,
# so if you set up an animation like "0*30, 1-4, 7"
# there'll be 35 frames in total, and the original "xxx01.png" would be the 31st frame, 
# equals to index 30
# FrameIndexFlag: a list of expressions
FrameIndexFlag:
  - 0, 1, 2; FirstFlag
  - 3, 4, 5; SecondFlag, ThirdFlag
  
# TextureIndexFlag, enables specific flags when the animation is using the certain index of the textures
# Note that this value only cares about which frame of the textures you're using,
# so even if you set up an animation like "0*30, 1-4, 7",
# the original "xxx01.png" will still be indexed as 1 in here
# TextureIndexFlag: a list of expressions
TextureIndexFlag:
  - 0, 1, 2; FirstFlagAlt
  - 3, 4, 5; SecondFlagAlt, ThirdFlagAlt